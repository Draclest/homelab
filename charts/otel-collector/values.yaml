opentelemetry-collector:
  mode: daemonset

  image:
    repository: "otel/opentelemetry-collector-contrib"

  presets:
    logsCollection:
      enabled: true
    hostMetrics:
      enabled: true
    kubeletMetrics:
      enabled: true
    kubernetesAttributes:
      enabled: true

  extraEnvsFrom:
    - secretRef:
        name: otel-es-credentials

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1000
      memory_limiter:
        check_interval: 5s
        limit_mib: 256
        spike_limit_mib: 64

    exporters:
      elasticsearch:
        endpoints:
          - https://elasticsearch-es-http.observability.svc:9200
        tls:
          insecure_skip_verify: true
        user: elastic
        password: ${env:ES_PASSWORD}
        mapping:
          mode: ecs
      debug:
        verbosity: basic

    extensions:
      health_check: {}

    service:
      extensions:
        - health_check
      pipelines:
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [elasticsearch, debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [elasticsearch, debug]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [elasticsearch, debug]

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
