nextcloud:

  nextcloud:
    host: nextcloud.draclest.ovh
    # admin credentials - overridden by SealedSecret via existingSecret
    existingSecret:
      enabled: true
      secretName: nextcloud-credentials
      usernameKey: nextcloud-username
      passwordKey: nextcloud-password
      smtpUsernameKey: smtp-username
      smtpPasswordKey: smtp-password

    trustedDomains:
      - nextcloud.draclest.ovh
      - 192.168.1.51

    defaultConfigs:
      .htaccess: true
      redis.config.php: false
      apache-pretty-urls.config.php: true
      apcu.config.php: true
      apps.config.php: true
      autoconfig.php: false
      smtp.config.php: true

    configs:
      overwrite.config.php: |-
        <?php
        $CONFIG = array(
          'overwrite.cli.url' => 'https://nextcloud.draclest.ovh',
          'overwriteprotocol' => 'https',
          'overwritehost' => 'nextcloud.draclest.ovh',
          'trusted_proxies' => ['192.168.1.51'],
        );
      redis.config.php: |-
        <?php
        $CONFIG = array(
          'memcache.distributed' => '\OC\Memcache\Redis',
          'memcache.locking' => '\OC\Memcache\Redis',
          'redis' => array(
            'host' => 'nextcloud-redis',
            'port' => 6379,
          ),
        );

    mail:
      enabled: true
      fromAddress: latour.geoffroy
      domain: gmail.com
      smtp:
        host: smtp.gmail.com
        secure: ssl
        port: 587
        authtype: LOGIN

    # Init container custom pour attendre MariaDB (remplace l'init container bitnami)
    extraInitContainers:
      - name: mariadb-isalive
        image: mariadb:11
        command:
          - sh
          - -c
          - |
            until mysql --host=nextcloud-mariadb --user=${MYSQL_USER} --password=${MYSQL_PASSWORD} --execute="SELECT 1;"; do
              echo "waiting for mariadb..."; sleep 2;
            done
        env:
          - name: MYSQL_USER
            value: nextcloudAdmin
          - name: MYSQL_PASSWORD
            valueFrom:
              secretKeyRef:
                name: nextcloud-credentials
                key: mariadb-password

  image:
    repository: nextcloud
    tag: 33-apache
    pullPolicy: IfNotPresent

  ingress:
    enabled: false

  service:
    type: NodePort
    port: 80
    nodePort: 30090

  persistence:
    enabled: true
    size: 50Gi
    accessMode: ReadWriteOnce

  mariadb:
    enabled: false

  externalDatabase:
    enabled: true
    type: mysql
    host: nextcloud-mariadb
    port: 3306
    user: nextcloudAdmin
    database: nextcloud_db
    existingSecret: nextcloud-credentials
    existingSecretPasswordKey: mariadb-password

  redis:
    enabled: false

  # Redis géré par notre StatefulSet custom (redis.yaml) avec l'image officielle redis:7-alpine

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

  livenessProbe:
    enabled: true
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 5

  readinessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 10
